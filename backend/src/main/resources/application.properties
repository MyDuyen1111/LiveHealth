#APP
%prod.quarkus.http.port=${SPRING_SERVER_PORT}
quarkus.application.name=livehealth
application.repository.query-limit-warning-ms=${QUERY_LIMIT_WARNING_MS:500}

#DATABASE
quarkus.datasource.db-kind=mysql
%prod.quarkus.datasource.jdbc.url=${SPRING_DATASOURCE_URL}
%prod.quarkus.datasource.username=${SPRING_DATASOURCE_USERNAME}
%prod.quarkus.datasource.password=${MYSQL_ROOT_PASSWORD}

#JPA / HIBERNATE
quarkus.hibernate-orm.database.generation=update
#quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

#JWT
jwt.secret=${JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}
#Expiration time (milliseconds)
#1 hour
jwt.access.expiration_time=${JWT_ACCESS_EXPIRATION_TIME:3600000}
#3 days
jwt.refresh.expiration_time=${JWT_REFRESH_EXPIRATION_TIME:259200000}

#Cloudinary
cloudinary.cloud_name=${CLOUDINARY_NAME:test}
cloudinary.api_key=${CLOUDINARY_API_KEY:test}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:test}

#Mail (Quarkus Mailer)
quarkus.mailer.host=smtp.gmail.com
%prod.quarkus.mailer.port=${SPRING_MAIL_PORT:587}
%prod.quarkus.mailer.username=${SPRING_MAIL_USERNAME:test}
%prod.quarkus.mailer.password=${SPRING_MAIL_PASSWORD:test}
quarkus.mailer.tls=false
quarkus.mailer.start-tls=REQUIRED

#Upload Image Limit
quarkus.http.limits.max-body-size=50M

# Redis Properties
%prod.quarkus.redis.hosts=redis://${SPRING_REDIS_HOST}:${SPRING_REDIS_PORT}
%prod.quarkus.redis.password=${REDIS_PASSWORD}

# Payment Config
vnpay.tmn-code=${VNPAY_TMN_CODE:test}
vnpay.hash-secret=${VNPAY_HASH_SECRET:test}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.api-url=https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
vnpay.return-url=http://localhost:62173/payment/vnpay/return
vnpay.version=2.1.0
vnpay.command=pay

#Swagger / OpenAPI
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/v3/api-docs
quarkus.swagger-ui.always-include=true

#Info Admin
app.admin.email=admin@livehealth.com
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.first-name=System
app.admin.last-name=Administrator
app.admin.phone=0123456789

#Security Endpoint (To be consumed by JAX-RS / ContainerRequestFilter security filters)
security.public-endpoints=/api/v1/auth/**,/api/v1/health/**,/api/v1/payment/vnpay/ipn
security.public-get-endpoints=/api/v1/categories,/api/v1/categories/{id},/api/v1/brands,/api/v1/brands/{id},/api/v1/tags,/api/v1/tags/{id},/api/v1/client-testimonials,/api/v1/client-testimonials/{id},/api/v1/professional-members,/api/v1/professional-members/{id},/api/v1/web-information,/api/v1/products,/api/v1/products/{id},/api/v1/products/*/reviews,/api/v1/reviews/{id},/api/v1/products/*/attributes,/api/v1/product-attributes/{id},/api/v1/products/*/promotions,/api/v1/product-promotions/{id},/api/v1/news-categories,/api/v1/news-categories/{id},/api/v1/news-tags,/api/v1/news-tags/{id},/api/v1/news,/api/v1/news/{id},/api/v1/news/category-counts,/api/v1/news/*/comments,/api/v1/news-comments/{id},/api/v1/payment-methods,/api/v1/payment-methods/{id},/api/v1/shipping-methods,/api/v1/shipping-methods/{id},/api/v1/payment/vnpay/return,/api/v1/payment/status/*
security.user-endpoints=/api/v1/user/**,/api/v1/cart/**,/api/v1/orders/me,/api/v1/orders,/api/v1/payment/create-payment
security.admin-endpoints=/api/v1/admin/**,/api/v1/products/*/images,/api/v1/products/*/tags,/api/v1/products/*/tags/*
security.swagger-endpoints=/swagger-ui/**,/v3/api-docs/**,/swagger-ui.html
